<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service Experience — Unique Touch Beauty Salon</title>
  <link rel="icon" type="image/png" href="brand_assets/favicon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <script src="page-transitions.js"></script>
  <style>
    :root {
      --bg:          #0A0906;
      --bg-card:     #161310;
      --gold:        #C9A84C;
      --gold-light:  #E0C46A;
      --gold-dim:    rgba(201,168,76,0.12);
      --cream:       #F4EDD6;
      --white:       #FFFFFF;
      --muted:       rgba(255,255,255,0.52);
      --dim:         rgba(255,255,255,0.28);
      /* folio theme mapping */
      --foreground:  var(--white);
      --background:  var(--bg);

      /* ── responsive spacing scale (fluid, shrinks on small screens) ── */
      --gutter:      clamp(16px, 5vw, 24px);
      --gutter-y:    clamp(12px, 3.5vw, 16px);
      --space-1:     clamp(0.375rem, 1.2vw, 0.5rem);
      --space-2:     clamp(0.625rem, 2vw, 0.875rem);
      --space-3:     clamp(0.875rem, 2.6vw, 1.25rem);
      --space-4:     clamp(1.25rem, 4vw, 2rem);
      --space-5:     clamp(1.75rem, 5vw, 2.75rem);
      --space-6:     clamp(2.25rem, 6vw, 3.25rem);
      --card-radius: clamp(10px, 2.5vw, 16px);
      --fab-inset-x: clamp(14px, 4.2vw, calc(24px + 1.75rem));
      --fab-inset-y: clamp(14px, 4.2vw, calc(36px + 0.875rem));
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* Keyboard focus — visible on every interactive element, invisible to mouse users */
    :focus-visible { outline: 2px solid var(--gold); outline-offset: 3px; }

    /* Fluid root: rem scales down proportionally on small screens, 16px at ~1440px. */
    html { background: var(--bg); font-size: clamp(14px, 13.33px + 0.185vw, 16px); }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ════════ FLOATING NAV (copied from index.html) ════════ */
    #menuBtn {
      position: fixed;
      top: calc(36px + 0.875rem);
      left: calc(24px + 1.75rem);
      z-index: 201;
    }
.menu-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: none; border: none; cursor: pointer; padding: 0; z-index: 201;
    }
    .menu-btn-icon {
      width: 14px; height: 14px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .menu-btn:hover .menu-btn-icon,
    .menu-btn.is-open .menu-btn-icon { transform: rotate(180deg); }
    .menu-btn-label {
      font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 500;
      font-variant: small-caps; letter-spacing: 0.08em; color: var(--white);
      transition: color 0.2s ease; position: relative; width: 2.8em; height: 1em; line-height: 1em;
    }
    .menu-btn:hover .menu-btn-label,
    .menu-btn.is-open .menu-btn-label { color: var(--gold); }
    .menu-btn-label .lbl-menu, .menu-btn-label .lbl-close {
      display: block; position: absolute; top: 0; left: 0; white-space: nowrap;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .menu-btn-label .lbl-close { opacity: 0; transform: translateY(4px); }
    .menu-btn.is-open .menu-btn-label .lbl-menu { opacity: 0; transform: translateY(-4px); }
    .menu-btn.is-open .menu-btn-label .lbl-close { opacity: 1; transform: translateY(0); }

    .menu-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0); z-index: 198;
      pointer-events: none; transition: background 0.4s ease;
    }
    .menu-backdrop.is-open { background: rgba(0,0,0,0.6); pointer-events: auto; }

    .menu-panel {
      position: fixed; top: 36px; left: 24px; z-index: 199;
      background: linear-gradient(145deg, rgba(255,255,255,0.08) 0%, rgba(180,180,180,0.08) 100%);
      backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px);
      border-radius: 20px; border: 1px solid rgba(201,168,76,0.75);
      box-shadow: 0 8px 32px rgba(0,0,0,0.45); overflow: hidden;
      width: 0; height: 0; min-width: 0; pointer-events: none; border-color: transparent;
    }
    .menu-panel.is-open { pointer-events: auto; border-color: rgba(201,168,76,0.75); }
    .menu-panel-inner {
      opacity: 0; padding: 24px 36px; transition: opacity 0.2s ease;
      width: 100%; box-sizing: border-box; display: flex; flex-direction: column;
    }
    .menu-panel.links-visible .menu-panel-inner { opacity: 1; }
    .menu-nav-links { list-style: none; display: flex; flex-direction: column; gap: 12px; }
    .menu-nav-links li {
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .menu-panel.links-visible .menu-nav-links li:nth-child(1) { opacity: 1; transform: none; transition-delay: 0.05s; }
    .menu-panel.links-visible .menu-nav-links li:nth-child(2) { opacity: 1; transform: none; transition-delay: 0.1s; }
    .menu-panel.links-visible .menu-nav-links li:nth-child(3) { opacity: 1; transform: none; transition-delay: 0.15s; }
    .menu-panel.links-visible .menu-nav-links li:nth-child(4) { opacity: 1; transform: none; transition-delay: 0.2s; }
    .menu-nav-links a {
      font-family: 'Cinzel', serif; font-size: 1.5rem; font-weight: 400; letter-spacing: 0.04em;
      color: var(--white); text-decoration: none; display: flex; align-items: center; gap: 0;
      overflow: hidden; padding: 0; transition: color 0.25s ease;
    }
    .menu-nav-links a:hover { color: var(--gold); }
    .menu-nav-links a .menu-link-arrow {
      display: inline-flex; width: 0; overflow: hidden; opacity: 0;
      transition: width 0.3s cubic-bezier(0.65,0,0.35,1), opacity 0.3s ease;
      flex-shrink: 0; align-items: center;
    }
    .menu-nav-links a:hover .menu-link-arrow { width: 1.5rem; opacity: 1; }
    .menu-nav-links a .menu-link-text { transition: transform 0.3s cubic-bezier(0.65,0,0.35,1); }
    .menu-nav-links a:hover .menu-link-text { transform: translateX(0.35rem); }
    .menu-divider { height: 1px; background: rgba(255,255,255,0.20); margin-top: 32px; }
    .menu-socials {
      display: flex; flex-direction: row; justify-content: flex-end; align-items: center;
      gap: 16px; margin-top: 16px;
    }
    .menu-social-link { color: var(--white); text-decoration: none; display: flex; align-items: center; transition: color 0.25s ease; }
    .menu-social-link:hover { color: var(--gold); }

    /* ════════ BUTTONS (copied from index.html) ════════ */
    .btn-gold {
      position: relative; display: inline-flex; align-items: center; gap: 8px;
      font-family: 'Montserrat', sans-serif; font-size: 0.875rem; font-weight: 500;
      letter-spacing: 0; text-transform: capitalize; color: var(--bg); background: var(--gold);
      height: 2.25rem; padding: 0 12px; border-radius: 100px; text-decoration: none;
      overflow: hidden; isolation: isolate; min-width: 0; cursor: pointer; border: none;
    }
    .btn-gold::before {
      content: ''; position: absolute; inset: 0; background: var(--gold-light);
      clip-path: inset(0 100% 0 0); border-radius: inherit;
      transition: clip-path 0.5s cubic-bezier(0.33, 1, 0.68, 1); z-index: 0;
    }
    .btn-gold:hover::before { clip-path: inset(0 0% 0 0); }
    .btn-gold .btn-arrow {
      position: relative; z-index: 1; display: flex; align-items: center; flex-shrink: 0;
      transition: transform 0.5s cubic-bezier(0.33, 1, 0.68, 1);
    }
    .btn-gold .btn-label { position: relative; z-index: 1; transition: transform 0.5s cubic-bezier(0.33, 1, 0.68, 1); }

    .btn-ghost {
      position: relative; display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
      outline: none; border: 0; text-decoration: none; background: transparent;
      padding: 0 12px 0 0; font-family: 'Montserrat', sans-serif; white-space: nowrap;
      flex-shrink: 0; height: 2.25rem;
    }
    .btn-ghost::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 38px; background: transparent;
      border: 1px solid var(--gold); border-radius: 100px;
      transition: width 0.5s cubic-bezier(0.33, 1, 0.68, 1); z-index: 0;
    }
    .btn-ghost:hover::before { width: 100%; }
    .btn-ghost .btn-arrow {
      position: relative; z-index: 1; width: 38px; height: 2.25rem; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0; color: var(--white);
    }
    .btn-ghost .btn-label {
      position: relative; z-index: 1; padding: 0; font-family: 'Montserrat', sans-serif;
      font-size: 0.875rem; font-weight: 500; letter-spacing: 0; text-transform: capitalize;
      color: var(--white); transform: translateX(8px);
      transition: transform 0.5s cubic-bezier(0.33, 1, 0.68, 1);
    }
    .btn-ghost:hover .btn-label { transform: translateX(0); }

    /* ════════ WORD TYPOGRAPHY SWAP ════════ */
    .word-swap { display: inline-grid; vertical-align: bottom; }
    .word-swap-mono, .word-swap-cinzel { grid-area: 1 / 1; }
    .word-swap-mono { transition: opacity 0.35s cubic-bezier(0.33, 1, 0.68, 1); }
    .word-swap-cinzel {
      font-family: 'Cinzel', serif; font-weight: 400; font-style: italic;
      font-size: inherit; white-space: nowrap; opacity: 0;
      transition: opacity 0.35s cubic-bezier(0.33, 1, 0.68, 1); pointer-events: none;
    }
    .btn-gold:hover .word-swap-mono { opacity: 0; }
    .btn-gold:hover .word-swap-cinzel { opacity: 1; }

    /* ════════ EXPERIENCE SECTION ════════ */
    #experience {
      position: relative; width: 100%; height: 100dvh; overflow: hidden;
      background: var(--bg); isolation: isolate;
    }
    /* atmospheric radial wash behind everything */
    #experience::before {
      content: ''; position: absolute; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(120% 80% at 78% 18%, rgba(201,168,76,0.10) 0%, transparent 55%),
        radial-gradient(90% 70% at 12% 90%, rgba(201,168,76,0.06) 0%, transparent 60%);
    }

    /* ── chrome: counter ── */
    .chrome-counter {
      position: absolute; bottom: 30px; right: 28px; z-index: 12;
      display: flex; align-items: center; gap: 12px; pointer-events: none;
    }
    .counter {
      font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.25em; color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .counter .sep { margin: 0 6px; opacity: 0.4; }
    .counter-rule { height: 1px; width: 32px; background: rgba(244,237,214,0.30); }
    .eyebrow {
      position: absolute; left: 28px; bottom: 30px; z-index: 12; pointer-events: none;
      font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.34em; color: var(--muted);
    }

    /* ── title list (left desktop / top mobile) ── */
    .title-wrap {
      position: absolute; left: 0; z-index: 4; overflow: hidden;
      -webkit-mask-image: linear-gradient(transparent 0, #000 24px, #000 calc(100% - 24px), transparent 100%);
      mask-image: linear-gradient(transparent 0, #000 24px, #000 calc(100% - 24px), transparent 100%);
    }
    #titleStrip { position: absolute; left: 0; right: 0; top: 0; will-change: transform; }
    .tr-row {
      display: flex; flex-direction: row; align-items: center; justify-content: center;
      cursor: pointer; user-select: none; padding: 0 clamp(1.5rem, 4vw, 4.5rem);
    }
    .tr-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 0; overflow: hidden; flex-shrink: 0; color: var(--gold);
      will-change: width, height, opacity, transform;
    }
    .tr-icon svg { display: block; width: 100%; height: 100%; flex-shrink: 0; }
    .tr-row h3 {
      font-family: 'Cinzel', serif; font-weight: 400; line-height: 1;
      letter-spacing: -0.005em; white-space: nowrap; color: var(--muted);
      will-change: transform; position: relative;
    }
    .tr-text-base { display: block; }
    .tr-text-grad {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      display: block; pointer-events: none;
      background: linear-gradient(180deg, #ffffff 0%, #d4b96a 42%, #6b4e1a 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; color: transparent;
      clip-path: inset(100% 0 0 0); will-change: clip-path;
    }
    .tr-desc {
      font-family: 'Montserrat', sans-serif; font-weight: 400;
      letter-spacing: 0.22em; font-size: 12px; line-height: 1.6;
      color: var(--white); margin-left: 3.6em; min-width: 0; opacity: 0;
      will-change: opacity, transform, clip-path;
    }

    /* ── image strip (right desktop / bottom mobile) ── */
    .image-wrap { position: absolute; z-index: 3; overflow: hidden; }
    #imageStrip { position: absolute; left: 0; right: 0; top: 0; will-change: transform; }
    .img-slot-wrap {
      position: absolute; left: 0; right: 0; display: flex; align-items: center; justify-content: center;
      transform: scale(1); transition: transform 0.6s cubic-bezier(0.22,0.8,0.32,1);
    }
    .img-slot-wrap.is-current { transform: scale(1.035); }
    .img-slot {
      position: relative; border-radius: 16px;
      background: var(--bg-card); aspect-ratio: 4 / 5;
      will-change: transform, opacity; box-shadow: 0 24px 60px -28px rgba(0,0,0,0.85);
    }
    .img-slot-inner {
      position: absolute; inset: 0; overflow: hidden; border-radius: 16px; z-index: 1;
    }
    .img-slot img, .img-slot video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .img-slot .slot-grad {
      position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(to top, rgba(10,9,6,0.42) 0%, rgba(10,9,6,0.04) 38%, transparent 70%);
    }
    .img-slot .slot-ring {
      position: absolute; inset: 0; border-radius: 16px; pointer-events: none;
      border: 1px solid rgba(201,168,76,0.0); transition: border-color 0.4s ease;
    }
    @property --gradient-angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }
    @keyframes gradient-rotate {
      to { --gradient-angle: 360deg; }
    }
    .img-slot-wrap.is-current .img-slot::before {
      content: '';
      position: absolute; inset: -2px; border-radius: 18px;
      background: conic-gradient(
        from var(--gradient-angle),
        #584827 0%,
        #c7a03c 37%,
        #f9de90 50%,
        #c7a03c 63%,
        #584827 75%,
        #c7a03c 87%,
        #f9de90 100%
      );
      animation: gradient-rotate 10s linear infinite;
      z-index: 0;
    }

    /* ── desktop geometry ── */
    .title-wrap { width: 50%; top: 10dvh; height: 80dvh; opacity: 0; will-change: transform, opacity, filter; }
    .image-wrap { right: 0; top: 0; width: 50%; height: 100dvh; opacity: 0; will-change: transform, opacity, filter; }

    /* ── mobile geometry ── */
    @media (max-width: 767px) {
      .title-wrap {
        width: 100%; top: 0; height: 50dvh;
      }
      .tr-row { flex-direction: column; align-items: center; text-align: center; padding: 0 1.25rem; }
      .tr-row h3 { white-space: normal; }
      .tr-icon { display: none; }
      .tr-desc { margin-left: 0; margin-top: 1.1em; }
      .image-wrap {
        left: 0; right: auto; width: 100%; top: 50dvh; height: 50dvh;
        -webkit-mask-image: linear-gradient(transparent 0, #000 20px, #000 calc(100% - 20px), transparent 100%);
        mask-image: linear-gradient(transparent 0, #000 20px, #000 calc(100% - 20px), transparent 100%);
      }
      .chrome-counter { bottom: 22px; right: 20px; }
      .eyebrow { left: 20px; bottom: 22px; }
      #menuBtn { top: calc(20px + 0.5rem); left: calc(16px + 0.5rem); }
    }

    /* ── cursor ring ── */
    #cursorRing {
      pointer-events: none; position: absolute; left: 0; top: 0; z-index: 14;
      display: grid; place-items: center; width: 76px; height: 76px;
      transform: translate3d(-100px,-100px,0) translate(-50%,-50%);
      border-radius: 50%; border: 1px solid rgba(255,255,255,0.55);
      mix-blend-mode: difference; opacity: 0;
      transition: opacity 0.26s ease-out; will-change: transform, opacity;
    }
    #cursorRing span {
      font-family: 'Montserrat', sans-serif; font-size: 9px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.32em; color: #fff;
    }
    @media (hover: none) { #cursorRing { display: none; } }

    /* ════════ DETAIL PANEL ════════ */
    #detail { position: absolute; inset: 0; z-index: 30; display: none; }
    #detail.is-active { display: block; }
    .detail-scrim { position: absolute; inset: 0; background: var(--bg); opacity: 0; }
    .detail-scrim::after {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(110% 80% at 82% 15%, rgba(201,168,76,0.10) 0%, transparent 55%);
    }

    .detail-content {
      position: absolute; left: 0; top: 0; height: 100%;
      width: calc(40vw - 60px);
      display: flex; flex-direction: column; align-items: center; text-align: center;
      padding: clamp(2rem, 4vw, 4.5rem) clamp(1.75rem, 3.4vw, 4rem);
      overflow-y: auto; overscroll-behavior: contain; -webkit-overflow-scrolling: touch;
    }
    .detail-content::-webkit-scrollbar { display: none; }
    .detail-content { scrollbar-width: none; }

    #menuBtn { transition: opacity 0.3s ease; }

    .d-eyebrow {
      font-family: 'Montserrat', sans-serif;
      font-size: 12px; font-weight: 400;
      letter-spacing: 0.22em;
      color: var(--white); margin-top: 2rem;
    }
    .d-title {
      font-family: 'Cinzel', serif; font-weight: 400; line-height: 1;
      letter-spacing: -0.005em; white-space: nowrap;
      font-size: clamp(2.4rem, 7dvh, 5rem); margin-top: 0.6rem;
      transform-origin: top left; visibility: hidden;
      background: linear-gradient(180deg, #ffffff 0%, #d4b96a 42%, #6b4e1a 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; color: transparent;
    }
    .d-intro { margin-top: 1.6rem; padding-bottom: 1.8rem; }
    .d-intro p {
      font-family: 'Montserrat', sans-serif; font-weight: 300; font-size: 0.975rem;
      line-height: 1.75; color: var(--white); margin-bottom: 0.9rem;
      white-space: nowrap; overflow: hidden;
    }
    .d-intro p:first-child {
      font-size: 24px; line-height: 1.4;
      white-space: normal; overflow: visible;
    }

    .d-section-label {
      font-family: 'Montserrat', sans-serif; font-size: 16px; font-weight: 600;
      text-transform: none; letter-spacing: 0.02em; color: var(--white);
      margin-bottom: 0.9rem;
    }
    .d-block { margin-top: 2.4rem; }
    .d-block--spaced { margin-top: 4rem; }

    /* treatment chooser */
    .d-chooser { display: flex; flex-wrap: wrap; gap: 0.6rem; justify-content: center; }
    .d-chooser-label {
      font-size: 16px; letter-spacing: 0.02em;
    }
    .d-chooser-label .lbl-choose { color: var(--gold); }
    .d-pill-wrap {
      position: relative; display: inline-flex; flex-direction: column; align-items: center;
    }
    .pill-info-btn {
      position: absolute; top: -5px; right: -5px; z-index: 10;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--bg); border: 1px solid rgba(201,168,76,0.55);
      color: var(--gold); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-family: Georgia, serif; font-style: italic; font-size: 8px; line-height: 1;
      padding: 0; transition: background 0.2s ease, border-color 0.2s ease, opacity 0.2s ease;
      opacity: 0; pointer-events: none;
    }
    .d-pill-wrap:has(.d-pill.is-active) .pill-info-btn { opacity: 1; pointer-events: auto; }
    .pill-info-btn:hover { background: rgba(201,168,76,0.12); border-color: var(--gold); }
    .pill-tooltip {
      position: absolute; bottom: calc(100% + 10px); left: 50%;
      transform: translateX(-50%) translateY(4px);
      width: max-content; max-width: 160px;
      background: rgba(10,9,6,0.92); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(201,168,76,0.38); border-radius: 8px;
      padding: 0.45rem 0.7rem;
      font-family: 'Montserrat', sans-serif; font-size: 0.65rem; font-weight: 400;
      letter-spacing: 0.04em; color: var(--white); line-height: 1.5; text-align: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 20;
    }
    .d-pill-wrap:has(.pill-info-btn:hover) .pill-tooltip,
    .d-pill-wrap:has(.pill-info-btn:focus-visible) .pill-tooltip,
    .d-pill-wrap.tip-open .pill-tooltip {
      opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto;
    }
    .d-pill {
      position: relative;
      display: inline-flex; align-items: center; justify-content: center;
      font-family: 'Montserrat', sans-serif; font-size: 0.8rem; font-weight: 500;
      letter-spacing: 0.01em; color: var(--white); cursor: pointer;
      padding: 0.55rem 1.05rem; border-radius: 100px;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(201,168,76,0.22);
      transition: border-color 0.5s cubic-bezier(0.22,0.8,0.32,1),

  function accentuate(text) {

    const dotSpace = text.match(/^(.+?\.)(\s+.+)$/);

    const andIdx = text.toLowerCase().indexOf(' and ');

    const words = text.split(' ');

  const N = CATS.length, LOOP_COPIES = 3, RENDERED = N * LOOP_COPIES;

  function applyLayout() {

  // ── per-frame loop ──
  function tick() {
    const now = performance.now();
    if (!navigating && !detailOpen && now - lastWheelTime > SNAP_IDLE) {
      const snapped = Math.round(targetPos);
      if (snapped !== targetPos) targetPos = snapped;
    }
    let next = Math.abs(targetPos - pos) < 0.0005 ? targetPos : pos + (targetPos - pos) * SMOOTHING;
    while (next < POS_MIN) { next += N; targetPos += N; }
    while (next >= POS_MAX) { next -= N; targetPos -= N; }
    pos = next;

    const L = LAYOUT;
    const vh = window.innerHeight / 100;

    const titleY = (L.titleMidVh - (pos + 0.5) * L.titleSlotVh) * vh;
    titleStrip.style.transform = `translate3d(0, ${titleY.toFixed(2)}px, 0)`;

    const imageY = (L.imageWrapperMidViewportVh - L.imageWrapperTopVh - L.imagePitchVh / 2
      - (RENDERED - 1) * L.imagePitchVh + pos * L.imagePitchVh) * vh + L.imageOffsetPx;
    imageStrip.style.transform = `translate3d(0, ${imageY.toFixed(2)}px, 0)`;

    for (let i = 0; i < RENDERED; i++) {
      const el = slotEls[i]; const dist = Math.abs(i - pos);
      let opacity, scale;
      if (dist < 1) { const t = 1 - dist; opacity = 0.78 + 0.22 * t; scale = 0.93 + 0.07 * t; }
      else if (dist < 2) { const t = 1 - (dist - 1); opacity = 0.18 + 0.60 * t; scale = 0.84 + 0.09 * t; }
      else { opacity = 0.18; scale = 0.84; }
      el.style.opacity = opacity.toFixed(3);
      el.style.transform = `scale(${scale.toFixed(4)})`;
      // Play only the slots near the viewport centre; pause the rest (and
      // everything while the detail panel covers the reel).
      const v = slotVids[i];
      if (v) {
        const shouldPlay = !detailOpen && dist < 1.75;
        if (shouldPlay !== v.__utPlaying) {
          v.__utPlaying = shouldPlay;
          if (shouldPlay) v.play().catch(() => {}); else v.pause();
        }
      }
    }

    for (let i = 0; i < RENDERED; i++) {
      const dist = Math.abs(i - pos);
      const tColor = Math.max(0, 1 - dist * 2);
      const sizeDist = Math.min(dist, 1);
      const tType = Math.max(0, 1 - sizeDist * 0.55);
      const h3 = titleH3s[i];
      h3.style.color = `color-mix(in srgb, var(--white) ${(tColor * 100).toFixed(1)}%, var(--muted))`;
      titleGrads[i].style.clipPath = `inset(${((1 - tColor) * 100).toFixed(1)}% 0 0 0)`;
      titleRows[i].style.opacity = (0.7 + 0.3 * tColor).toFixed(3);
      const fontVh = L.titleFontVhMin + (L.titleFontVhMax - L.titleFontVhMin) * tType;
      h3.style.fontSize = fontVh.toFixed(2) + 'dvh';

      // active-amount: drives icon reveal/rotation, title nudge and descriptor reveal in lockstep
      const td = Math.max(0, 1 - dist * 2.8);
      const icon = titleIcons[i];
      const iconVh = fontVh * 0.46;
      icon.style.height = iconVh.toFixed(2) + 'dvh';
      icon.style.width = (td * iconVh).toFixed(2) + 'dvh';
      icon.style.opacity = td.toFixed(3);

      h3.style.transform = `translateX(${(td * 0.18).toFixed(3)}em) translateY(0.05em)`;

      d.style.transform = `translateX(${((1 - td) * -8).toFixed(2)}px)`;

    const rounded = Math.max(0, Math.min(RENDERED - 1, Math.round(pos)));

             <div class="d-grid">
               <div class="d-cell"><div class="d-cell-k">Duration</div><div class="d-cell-v" id="dDur">${t0.dur}</div></div>
               <div class="d-cell"><div class="d-cell-k">Investment</div><div class="d-cell-v" id="dInv">${priceVal(t0.price)}<span class="xcg">XCG</span></div></div>
               <div class="d-cell"><div class="d-cell-k">Maintenance</div><div class="d-cell-v" id="dMaint">${t0.maint}</div></div>
               <div class="d-cell"><div class="d-cell-k">Best For</div><div class="d-cell-v" id="dBest">${t0.best}</div></div>
             </div>
             <div class="d-cross" id="dCross"><div class="d-cross-h"></div><div class="d-cross-v"></div></div>
           </div>
         </div>

         <div class="d-block" data-detail-reveal>
           <div class="d-section-label">Why Clients Love It</div>
           <div class="d-favs">${favs}</div>
         </div>

         <div class="d-block d-block--spaced" data-detail-reveal>
           <div class="d-section-label">Client Experience</div>
           <div class="d-quote">
             ${cat.review.name ? '<div class="d-stars">★★★★★</div>' : ''}
             <blockquote>“${cat.review.text}”</blockquote>
             ${cat.review.name ? `<cite>${cat.review.name}</cite>` : ''}
           </div>
         </div>

         <div class="d-block" data-detail-reveal>
           <div class="d-section-label">Appointment Guide</div>
           <div class="d-acc">${acc}</div>
         </div>

         <div class="d-booking" data-detail-reveal>
           <h4>Your Moment Awaits</h4>
           <p><span style="display:block">You've found the treatment that's right for you.</span><span style="display:block">Now choose a time that works for your schedule and we'll take care of the rest.</span></p>
           <button class="btn-gold" id="dBook"><span class="btn-arrow">${ARROW}</span><span class="btn-label"><span class="word-swap"><span class="word-swap-mono">Reserve</span><span class="word-swap-cinzel">Reserve</span></span> My Appointment</span></button>
         </div>

         <div class="detail-image-frame">
           <div class="detail-image" id="dImage">
             <video src="${cat.video}" muted loop autoplay playsinline disablepictureinpicture preload="auto"></video>
             <div class="slot-grad"></div>
           </div>
           <button class="btn-ghost" data-detail-reveal data-detail-close>
             <span class="btn-arrow"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M12 7H2M6 3L2 7l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
             <span class="btn-label">Back to services</span>
           </button>
         </div>
       </div>`;

    currentTreatment = 0;

    // scroll progress bar
    const progressBar = document.getElementById('scroll-progress');
    const dContent = detailEl.querySelector('.detail-content');
    progressBar.style.width = '0%';
    progressBar.classList.add('is-active');
    dContent.addEventListener('scroll', () => {
      const pct = dContent.scrollTop / (dContent.scrollHeight - dContent.clientHeight) * 100;
      progressBar.style.width = Math.min(100, pct).toFixed(2) + '%';
    }, { passive: true });

    // chooser
    detailEl.querySelectorAll('.d-pill').forEach(p => {
      p.addEventListener('click', () => selectTreatment(catIdx, parseInt(p.dataset.ti, 10)));
    });
    // info tooltip tap toggle (mobile)
    detailEl.querySelectorAll('.pill-info-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const wrap = btn.closest('.d-pill-wrap');
        const wasOpen = wrap.classList.contains('tip-open');
        detailEl.querySelectorAll('.d-pill-wrap.tip-open').forEach(w => w.classList.remove('tip-open'));
        if (!wasOpen) wrap.classList.add('tip-open');
      });
    });
    detailEl.querySelector('.detail-content').addEventListener('click', () => {
      detailEl.querySelectorAll('.d-pill-wrap.tip-open').forEach(w => w.classList.remove('tip-open'));
    });
    // accordion
    detailEl.querySelectorAll('[data-acc]').forEach(btn => {
      btn.addEventListener('click', () => {
        const item = btn.closest('.d-acc-item');
        const body = item.querySelector('.d-acc-body');
        const open = item.classList.toggle('is-open');
        body.style.maxHeight = open ? body.scrollHeight + 'px' : '0';
      });
    });
    // booking
    const dBook = detailEl.querySelector('#dBook');
    attachBtnSwap(dBook);
    dBook.addEventListener('click', () => openBooking(cat.name));
    // close handlers
    detailEl.querySelectorAll('[data-detail-close]').forEach(b => b.addEventListener('click', closeDetail));
    detailEl.querySelector('[data-detail-bg]').addEventListener('click', closeDetail);
    // subtle parallax on detail image (desktop)
    if (!mq.matches) {
      const innerImg = detailEl.querySelector('#dImage video');
      detailEl.addEventListener('pointermove', (e) => {
        const cx = (e.clientX / window.innerWidth - 0.5) * 2;
        const cy = (e.clientY / window.innerHeight - 0.5) * 2;
        dImageInner.tx = cx * 8; dImageInner.ty = cy * 8;
        if (phase === 'detail') gsap.to(innerImg, { x: dImageInner.tx, y: dImageInner.ty, scale: 1.04, duration: 0.8, ease: 'power2.out', overwrite: 'auto' });
      });
    }
  }

  function selectTreatment(catIdx, ti) {
    if (ti === currentTreatment) return;
    currentTreatment = ti;
    const t = CATS[catIdx].treatments[ti];
    detailEl.querySelectorAll('.d-pill').forEach(p => p.classList.toggle('is-active', parseInt(p.dataset.ti, 10) === ti));
    const cells = [
      [detailEl.querySelector('#dDur'), t.dur],
      [detailEl.querySelector('#dInv'), priceVal(t.price) + '<span class="xcg">XCG</span>'],
      [detailEl.querySelector('#dMaint'), t.maint],
      [detailEl.querySelector('#dBest'), t.best]
    ];
    // Pulse cross lines from center outward, fade out when new text is visible
    const dCross = detailEl.querySelector('#dCross');
    if (dCross) {
      const h = dCross.querySelector('.d-cross-h');
      const v = dCross.querySelector('.d-cross-v');
      gsap.killTweensOf([h, v]);
      gsap.set(h, { scaleX: 0, opacity: 1 });
      gsap.set(v, { scaleY: 0, opacity: 1 });
      gsap.to(h, { scaleX: 1, duration: 0.45, ease: 'sine.inOut' });
      gsap.to(v, { scaleY: 1, duration: 0.45, ease: 'sine.inOut' });
      gsap.to([h, v], { opacity: 0, duration: 0.3, ease: 'power2.in', delay: 0.6 });
    }

    cells.forEach(([el, html]) => {
      gsap.to(el, {
        opacity: 0, duration: 0.35, ease: 'power2.inOut',
        onComplete: () => {
          el.innerHTML = html;
          gsap.fromTo(el, { opacity: 0, y: 6 }, { opacity: 1, y: 0, duration: 0.55, ease: 'power3.out' });
        }
      });
    });
  }

  function openDetail(idx) {
    if (phase !== 'idle' || !entranceDone) return;
    const slot = slotEls[idx], h3 = titleH3s[idx];
    sourceImgRect = slot.getBoundingClientRect();
    sourceTitleRect = h3.getBoundingClientRect();
    hiddenIdx = idx;
    slot.style.visibility = 'hidden';
    h3.style.visibility = 'hidden';
    phase = 'opening'; detailOpen = true;
    document.body.style.overflow = 'hidden';
    buildDetail(idx % N);
    detailEl.classList.add('is-active');
    const mb = document.getElementById('menuBtn');
    mb.style.opacity = '0'; mb.style.pointerEvents = 'none';

    requestAnimationFrame(() => runFlipOpen());
  }

  function runFlipOpen() {
    const root = detailEl;
    const scrim = root.querySelector('[data-detail-scrim]');
    gsap.fromTo(scrim, { opacity: 0 }, { opacity: 1, duration: 0.45, ease: 'power2.out' });

    const imgEl = root.querySelector('#dImage');
    if (sourceImgRect && imgEl) {
      const t = imgEl.getBoundingClientRect();
      const dx = sourceImgRect.left - t.left, dy = sourceImgRect.top - t.top;
      const sx = sourceImgRect.width / t.width, sy = sourceImgRect.height / t.height;
      gsap.set(imgEl, { visibility: 'visible', transformOrigin: 'top left', x: dx, y: dy, scaleX: sx, scaleY: sy });
      gsap.to(imgEl, { x: 0, y: 0, scaleX: 1, scaleY: 1, duration: 0.7, ease: 'power2.out' });
    }

    const titleEl = root.querySelector('#dTitle');
    if (sourceTitleRect && titleEl) {
      const t = titleEl.getBoundingClientRect();
      const dx = sourceTitleRect.left - t.left, dy = sourceTitleRect.top - t.top;
      const s = sourceTitleRect.height / t.height;
      gsap.set(titleEl, { visibility: 'visible', transformOrigin: 'top left', x: dx, y: dy, scale: s });
      gsap.to(titleEl, { x: 0, y: 0, scale: 1, duration: 0.95, ease: 'power4.out', onComplete: () => { phase = 'detail'; } });
      const lift = sourceTitleRect.top - t.top;
      if (hiddenIdx !== null && lift !== 0) {
        for (let i = 0; i < hiddenIdx; i++) gsap.to(titleRows[i], { y: -lift, duration: 0.95, ease: 'power4.out' });
      }
    } else { phase = 'detail'; }

    gsap.fromTo(root.querySelectorAll('[data-detail-reveal]'),
      { y: 24, opacity: 0, filter: 'blur(8px)' },
      { y: 0, opacity: 1, filter: 'blur(0px)', duration: 0.9, ease: 'power4.out', stagger: 0.05, delay: 0.25 });

    // ── Sequential fav entrance: icon spins in → text slides in → next row starts as line finishes ──
    const favEls = Array.from(root.querySelectorAll('.d-fav'));
    favEls.forEach((fav, i) => {
      const icon = fav.querySelector('.d-fav-icon');
      const text = fav.querySelector('.d-fav-text');
      if (!icon || !text) return;
      const rowDelay = 0.6 + i * 0.45;
      gsap.fromTo(icon,
        { rotation: -120, opacity: 0, scale: 0.4 },
        { rotation: 0, opacity: 1, scale: 1, duration: 0.65, ease: 'back.out(1.4)', delay: rowDelay }
      );
      gsap.fromTo(text,
        { opacity: 0, x: -10 },
        { opacity: 1, x: 0, duration: 0.30, ease: 'power3.out', delay: rowDelay + 0.35 }
      );
    });
  }

  function closeDetail() {
    if (phase === 'closing' || phase === 'idle') return;
    phase = 'closing';
    const root = detailEl;
    const reveal = root.querySelectorAll('[data-detail-reveal]');
    gsap.to(reveal, { y: 14, opacity: 0, filter: 'blur(6px)', duration: 0.35, ease: 'power3.in', stagger: 0.03 });
    const scrim = root.querySelector('[data-detail-scrim]');
    if (scrim) gsap.to(scrim, { opacity: 0, duration: 0.55, delay: 0.25, ease: 'power2.in' });

    const imgEl = root.querySelector('#dImage');
    if (sourceImgRect && imgEl) {
      const t = imgEl.getBoundingClientRect();
      gsap.to(imgEl, {
        x: sourceImgRect.left - t.left, y: sourceImgRect.top - t.top,
        scaleX: sourceImgRect.width / t.width, scaleY: sourceImgRect.height / t.height,
        duration: 0.7, ease: 'power2.inOut', delay: 0.05
      });
    }
    const titleEl = root.querySelector('#dTitle');
    if (sourceTitleRect && titleEl) {
      const t = titleEl.getBoundingClientRect();
      gsap.to(titleEl, {
        x: sourceTitleRect.left - t.left, y: sourceTitleRect.top - t.top,
        scale: sourceTitleRect.height / t.height,
        duration: 0.85, ease: 'power3.inOut', delay: 0.05, onComplete: finalizeClose
      });
      if (hiddenIdx !== null) {
        for (let i = 0; i < hiddenIdx; i++) gsap.to(titleRows[i], { y: 0, duration: 0.85, ease: 'power3.inOut', delay: 0.05 });
      }
    } else { finalizeClose(); }
  }

  function finalizeClose() {
    if (hiddenIdx !== null) {
      const slot = slotEls[hiddenIdx], h3 = titleH3s[hiddenIdx];
      if (slot) slot.style.visibility = '';
      if (h3) h3.style.visibility = '';
      for (let i = 0; i < hiddenIdx; i++) gsap.set(titleRows[i], { clearProps: 'transform' });
    }
    hiddenIdx = null; sourceImgRect = null; sourceTitleRect = null;
    detailEl.classList.remove('is-active');
    detailEl.innerHTML = '';
    detailOpen = false; phase = 'idle';
    const pb = document.getElementById('scroll-progress');
    pb.style.width = '0%'; pb.classList.remove('is-active');
    const mb2 = document.getElementById('menuBtn');
    mb2.style.opacity = ''; mb2.style.pointerEvents = '';
    if (!bookingOpen) document.body.style.overflow = 'hidden';
  }

  /* ════════════════════ BOOKING MODAL ════════════════════ */
  const bookingModal = document.getElementById('bookingModal');
  const bmFrame = document.getElementById('bmFrame');
  const bmLoading = document.getElementById('bmLoading');
  const bmTitle = document.getElementById('bmTitle');
  let bookingOpen = false;

  bmFrame.addEventListener('load', () => { if (bmFrame.src) bmLoading.style.opacity = '0'; });

  function openBooking(catName) {
    bookingOpen = true;
    bmTitle.textContent = catName ? 'Book · ' + catName : 'Book Your Appointment';
    bmLoading.style.opacity = '1';
    bmFrame.src = BOOKING_URL;
    bookingModal.classList.add('is-active');
    document.body.style.overflow = 'hidden';
    const scrim = bookingModal.querySelector('.bm-scrim');
    const panel = bookingModal.querySelector('.bm-panel');
    gsap.fromTo(scrim, { opacity: 0 }, { opacity: 1, duration: 0.4, ease: 'power2.out' });
    gsap.fromTo(panel, { opacity: 0, scale: 0.94, xPercent: -50, yPercent: -50 },
      { opacity: 1, scale: 1, duration: 0.5, ease: 'power3.out' });
  }
  function closeBooking() {
    if (!bookingOpen) return;
    const scrim = bookingModal.querySelector('.bm-scrim');
    const panel = bookingModal.querySelector('.bm-panel');
    gsap.to(scrim, { opacity: 0, duration: 0.35, ease: 'power2.in' });
    gsap.to(panel, {
      opacity: 0, scale: 0.96, duration: 0.35, ease: 'power2.in',
      onComplete: () => {
        bookingModal.classList.remove('is-active');
        bmFrame.src = ''; bookingOpen = false;
        if (!detailOpen) document.body.style.overflow = 'hidden';
      }
    });
  }
  bookingModal.querySelectorAll('[data-bm-close]').forEach(b => b.addEventListener('click', closeBooking));

  // global Esc precedence: booking → detail → menu
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Escape') return;
    if (bookingOpen) { closeBooking(); return; }
    if (detailOpen) { closeDetail(); return; }
    if (window.__menuOpen && window.__menuOpen()) { window.__closeMenu(); }
  });

  /* ════════════════════ ENTRANCE ════════════════════ */
  function runEntrance() {
    const tl = gsap.timeline({ onComplete: () => { entranceDone = true; entranceTL = null; } });
    entranceTL = tl;
    tl.fromTo([titleWrap, imageWrap],
      { opacity: 0, y: 24, scale: 1.03, filter: 'blur(12px)' },
      { opacity: 1, y: 0, scale: 1, filter: 'blur(0px)', duration: 0.9, ease: 'power4.out', stagger: 0.06 }, 0);
    tl.fromTo(document.querySelectorAll('[data-chrome]'),
      { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.7, ease: 'power3.out', stagger: 0.05 }, 0.5);
    const ep = { value: POS_MIN };
    const cycle = Math.floor(1.4 * N) + Math.floor(Math.random() * N);
    tl.to(ep, {
      value: POS_MIN + cycle, duration: 1.7, ease: 'power4.out',
      onUpdate: () => {
        let v = ep.value; while (v < POS_MIN) v += N; while (v >= POS_MAX) v -= N;
        pos = v; targetPos = v;
      }
    }, 0);
  }
  function skipEntrance() {
    if (entranceDone) return;
    if (entranceTL) { entranceTL.kill(); entranceTL = null; }
    gsap.set([titleWrap, imageWrap], { opacity: 1, y: 0, scale: 1, filter: 'blur(0px)' });
    gsap.set(document.querySelectorAll('[data-chrome]'), { opacity: 1, y: 0 });
    entranceDone = true;
  }

  /* ════════════════════ INIT ════════════════════ */
  buildStrips();
  applyLayout();
  mq.addEventListener('change', () => { LAYOUT = mq.matches ? MOBILE : DESKTOP; applyLayout(); });
  requestAnimationFrame(tick);

  // Deep link: ?service=<slug> jumps straight to that service's opened detail state
  const requestedSlug = new URLSearchParams(location.search).get('service');
  const requestedIdx = requestedSlug ? CATS.findIndex(c => c.slug === requestedSlug) : -1;

  if (requestedIdx !== -1) {
    pos = targetPos = activeIdx = POS_MIN + requestedIdx;
    counterCur.textContent = String(requestedIdx + 1).padStart(2, '0');
    skipEntrance();
    requestAnimationFrame(() => requestAnimationFrame(() => openDetail(activeIdx)));
  } else {
    runEntrance();
  }
  slotWraps[activeIdx].classList.add('is-current');
  </script>
</body>
</html>
